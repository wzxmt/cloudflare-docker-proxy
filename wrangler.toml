name = "cloudflare-docker-proxy"
compatibility_date = "2024-10-09"

[dev]
ip = "0.0.0.0"
port = 8787
local_protocol = "http"

[env.vars]
CUSTOM_DOMAIN = "wzxmt.xyz"

[env.dev.vars]
MODE = "debug"
TARGET_UPSTREAM = "https://registry-1.docker.io"

[env.production]
name = "cloudflare-docker-proxy"
routes = [
  { pattern = "docker.wzxmt.xyz", custom_domain = true },
  { pattern = "quay.wzxmt.xyz", custom_domain = true },
  { pattern = "gcr.wzxmt.xyz", custom_domain = true },
  { pattern = "k8s-gcr.wzxmt.xyz", custom_domain = true },
  { pattern = "k8s.wzxmt.xyz", custom_domain = true },
  { pattern = "ghcr.wzxmt.xyz", custom_domain = true },
  { pattern = "cloudsmith.wzxmt.xyz", custom_domain = true },
]

[env.production.vars]
MODE = "production"
TARGET_UPSTREAM = ""
